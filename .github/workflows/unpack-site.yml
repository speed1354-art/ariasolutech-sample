name: Unpack ARIA SOLUTECH site

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  unpack:
    if: ${{ hashFiles('ariasolutech-site.tar.gz') != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Extract complete website
        run: |
          tar -xzf ariasolutech-site.tar.gz
          rm ariasolutech-site.tar.gz
          rm .github/workflows/unpack-site.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
      - name: Commit extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add complete ARIA SOLUTECH website files"
          git push
