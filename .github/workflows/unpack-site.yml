name: Unpack ARIA SOLUTECH site

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ariasolutech-site.tar.gz'
      - '.github/workflows/unpack-site.yml'

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract complete website into repository root
        run: |
          test -f ariasolutech-site.tar.gz
          tar -xzf ariasolutech-site.tar.gz --strip-components=1
          rm -f ariasolutech-site.tar.gz

      - name: Commit extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Add complete ARIA SOLUTECH website files"
          git push origin main
